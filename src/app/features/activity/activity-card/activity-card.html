<article class="activity-card">
  <button class="avatar" (click)="onActor()" aria-label="View profile">
    @if (item().actor.avatar_url) {
      <img [src]="item().actor.avatar_url" [alt]="item().actor.username" />
    } @else {
      {{ item().actor.username.charAt(0).toUpperCase() }}
    }
  </button>

  <div class="body">
    <p class="line">
      <button class="user" (click)="onActor()">{{ item().actor.username }}</button>
      <span class="verb">{{ verb() }}</span>

      @if (item().type === 'follow' && item().target_user) {
        <button class="user" (click)="onTargetUser()">{{ item().target_user!.username }}</button>
      } @else if (item().review) {
        <button class="album-name" (click)="onAlbum()">{{ item().review!.album.title }}</button>
      }
      <span class="date">{{ formatDate(item().created_at) }}</span>
    </p>

    @if (item().review; as review) {
      <div class="rating">
        @for (i of [1, 2, 3, 4, 5]; track i) {
          <lucide-icon [img]="Star" size="12" [class.filled]="i <= review.rating"></lucide-icon>
        }
      </div>
    }
  </div>

  @if (item().review; as review) {
    <button class="cover" (click)="onAlbum()" aria-label="View album">
      @if (review.album.cover) {
        <img [src]="review.album.cover" [alt]="review.album.title" />
      }
    </button>
  }
</article>

<section class="activity">
  <header class="page-header">
    <h1>Activity</h1>
    <p>From people you follow</p>
  </header>

  @if (loading()) {
    <p class="state">Loading activity…</p>
  } @else if (items().length === 0) {
    <p class="state">
      No activity yet. Follow some people to see what they're up to.
    </p>
  } @else {
    <ul class="feed">
      @for (item of items(); track item.id) {
        <li>
          <app-activity-card
            [item]="item"
            (reviewClick)="onReviewClick($event)"
            (userClick)="onUserClick($event)"
          />
        </li>
      }
    </ul>

    @if (hasMore()) {
      <button class="load-more" (click)="loadMore()" [disabled]="loadingMore()">
        {{ loadingMore() ? 'Loading…' : 'Load more' }}
      </button>
    }
  }
</section>

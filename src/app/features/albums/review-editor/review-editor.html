<div class="page">
  <header class="head">
    <button class="back" (click)="cancel()" aria-label="Back">
      <lucide-icon [img]="ArrowLeft" size="20"></lucide-icon>
    </button>
    <h1 class="title">{{ existingId() ? 'Edit review' : 'Write review' }}</h1>
  </header>

  @if (album(); as a) {
    <div class="album-row">
      <div class="cover">
        @if (a.cover) {
          <img [src]="a.cover" [alt]="a.title" />
        }
      </div>
      <div class="album-info">
        <span class="album-title">{{ a.title }}</span>
        <span class="album-artist">{{ a.artist.name }}</span>
      </div>
    </div>

    <div class="rating">
      <span class="rating-label">Your rating</span>
      <div class="rate-stars" (mouseleave)="onStarsLeave()">
        @for (i of stars; track i) {
          <button
            type="button"
            class="rate-star"
            (click)="onStarClick(i)"
            (mouseenter)="onStarHover(i)"
            [attr.aria-label]="i + ' stars'"
          >
            <lucide-icon [img]="Star" class="rate-star-bg"></lucide-icon>
            <div class="rate-star-fill" [style.width.%]="getStarFillPercent(i)">
              <lucide-icon [img]="Star" class="rate-star-fg"></lucide-icon>
            </div>
          </button>
        }
      </div>
    </div>

    <textarea
      class="composer"
      [ngModel]="draftContent()"
      (ngModelChange)="draftContent.set($event)"
      placeholder="Write your review…"
      rows="8"
      maxlength="1000"
    ></textarea>

    <footer class="actions">
      @if (existingId()) {
        <button class="btn-delete" type="button" [disabled]="saving()" (click)="remove()">
          Delete
        </button>
      }
      <button class="btn-secondary" type="button" (click)="cancel()">Cancel</button>
      <button
        class="btn-primary"
        type="button"
        [disabled]="draftRating() === 0 || saving()"
        (click)="save()"
      >
        {{ saving() ? 'Saving…' : 'Save' }}
      </button>
    </footer>
  }
</div>

<article class="card" (click)="onAlbum($event)">
  <div class="cover">
    @if (item().album.cover) {
      <img [src]="item().album.cover" [alt]="item().album.title" />
    } @else {
      <div class="cover-placeholder"></div>
    }
  </div>

  <div class="body">
    <div class="album">
      <span class="album-title">{{ item().album.title }}</span>
      <span class="album-artist">{{ item().album.artist.name }}</span>
    </div>

    <div class="rating">
      @for (i of stars; track i) {
        <lucide-icon [img]="Star" size="13" [class.filled]="i <= item().rating"></lucide-icon>
      }
    </div>

    @if (item().content) {
      <p class="content">{{ item().content }}</p>
    }

    <footer class="meta">
      <button class="author" type="button" (click)="onUser($event)">
        <div class="avatar">
          @if (item().author.avatar_url) {
            <img [src]="item().author.avatar_url" [alt]="item().author.username" />
          } @else {
            {{ item().author.username.charAt(0).toUpperCase() }}
          }
        </div>
        <span class="username">{{ item().author.username }}</span>
      </button>
      <span class="date">{{ formatDate(item().created_at) }}</span>
    </footer>
  </div>
</article>

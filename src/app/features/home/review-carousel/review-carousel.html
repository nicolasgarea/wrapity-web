<app-carousel [title]="title()" [seeAllLink]="seeAllLink()" [loading]="loading()">
  @if (!loading() && items().length === 0 && emptyTitle()) {
    <div class="empty">
      <p class="empty-title">{{ emptyTitle() }}</p>
      @if (emptyHint()) {
        <p class="empty-hint">{{ emptyHint() }}</p>
      }
    </div>
  } @else {
    @for (item of items(); track item.id) {
      <app-review-card
        [item]="item"
        (reviewClick)="goToReview($event)"
        (userClick)="goToUser($event)"
      />
    }

    @if (loadingMore()) {
      <div class="more-loading">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    }

    <div #sentinel class="sentinel"></div>
  }
</app-carousel>

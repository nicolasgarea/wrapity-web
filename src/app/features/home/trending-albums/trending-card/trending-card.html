<a [routerLink]="['/albums', album().id]" class="card">
  @if (rank()) {
    <span class="rank">#{{ rank() }}</span>
  }

  <div class="cover">
    @if (album().cover) {
      <img [src]="album().cover" [alt]="album().title" />
    } @else {
      <div class="cover-placeholder"></div>
    }
  </div>

  <div class="info">
    <h3 class="title">{{ album().title }}</h3>
    <p class="artist">{{ album().artist.name }}</p>
  </div>
</a>

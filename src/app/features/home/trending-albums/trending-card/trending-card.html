<a [routerLink]="['/albums', album().id]" class="card">
  @if (album().cover) {
    <img class="cover" [src]="album().cover" [alt]="album().title" />
  } @else {
    <div class="cover cover-placeholder"></div>
  }
  <div class="overlay"></div>
  <div class="info">
    <h3 class="title">{{ album().title }}</h3>
    <p class="artist">{{ album().artist.name }}</p>
  </div>
</a>

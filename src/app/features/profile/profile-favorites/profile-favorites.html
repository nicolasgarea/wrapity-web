<section class="favorites">
  <div class="head">
    <h2 class="title">Favorite Albums</h2>
    @if (isMe()) {
      <a class="edit" [routerLink]="['/profile/edit-favorites']">Edit</a>
    }
  </div>

  @if (isEmpty() && isMe()) {
    <div class="empty">
      <p>You haven't picked your favorites yet.</p>
      <a class="empty-cta" [routerLink]="['/profile/edit-favorites']">Choose favorites →</a>
    </div>
  } @else {
    <app-album-grid [items]="items()" />
  }
</section>

<header class="header">
  <div class="avatar">
    @if (user().avatar_url) {
      <img [src]="user().avatar_url" [alt]="user().username" />
    } @else {
      <div class="avatar-placeholder">
        {{ user().username.charAt(0).toUpperCase() }}
      </div>
    }
  </div>

  <div class="info">
    <h1 class="username">{{ user().username }}</h1>

    @if (user().bio) {
      <p class="bio">{{ user().bio }}</p>
    }

    <div class="stats">
      <div class="stat">
        <span class="value">{{ user().reviews_count }}</span>
        <span class="label">Reviews</span>
      </div>
      <button class="stat" type="button">
        <span class="value">{{ user().followers_count }}</span>
        <span class="label">Followers</span>
      </button>
      <button class="stat" type="button">
        <span class="value">{{ user().following_count }}</span>
        <span class="label">Following</span>
      </button>
    </div>

    <div class="actions">
      @if (isMe()) {
        <button class="action" type="button" disabled>Edit profile</button>
      } @else if (user().is_following !== null) {
        <button
          class="action"
          [class.following]="user().is_following"
          type="button"
          (click)="toggleFollow.emit()"
        >
          {{ user().is_following ? 'Following' : 'Follow' }}
        </button>
      }
    </div>
  </div>
</header>

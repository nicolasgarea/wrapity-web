@if (loading()) {
  <div class="state">Loading…</div>
} @else if (user(); as u) {
  <div class="profile">
    <app-profile-header [user]="u" [isMe]="isMe()" (toggleFollow)="onToggleFollow()" />
    <app-profile-favorites [favorites]="favorites()" [isMe]="isMe()" />
    <app-profile-reviews [userId]="u.id" [username]="u.username" />
  </div>
}

@if (loading()) {
  <div class="loading-state">Loading…</div>
} @else if (user(); as u) {
  <div class="page">

    <app-profile-header [user]="u" [isMe]="isMe()" (toggleFollow)="onToggleFollow()" />

    <div class="divider"></div>

    <app-profile-favorites [favorites]="favorites()" [isMe]="isMe()" />

    <div class="divider"></div>

    <nav class="tabs">
      <button class="tab" [class.active]="section() === 'reviews'" (click)="section.set('reviews')">
        Reviews
      </button>
      <button class="tab" [class.active]="section() === 'diary'" (click)="section.set('diary')">
        Diary
      </button>
      <button class="tab" [class.active]="section() === 'likes'" (click)="section.set('likes')">
        Likes
      </button>
    </nav>

    <div class="tab-body">
      @if (section() === 'reviews') {
        <app-profile-reviews [userId]="u.id" />
      } @else if (section() === 'diary') {
        <app-profile-diary [userId]="u.id" />
      } @else {
        <app-profile-likes [userId]="u.id" />
      }
    </div>

  </div>
}

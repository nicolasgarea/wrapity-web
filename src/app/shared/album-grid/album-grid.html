<div class="grid">
  @for (item of items(); track $index) {
    @if (item.empty) {
      <div class="cell empty"></div>
    } @else {
      <a class="cell" [routerLink]="item.reviewId ? ['/reviews', item.reviewId] : ['/albums', item.albumId]">
        @if (item.cover) {
          <img [src]="item.cover" [alt]="item.title" />
        }
        @if (item.rating) {
          <span class="rating">{{ item.rating }}★</span>
        }
      </a>
    }
  }
</div>

<section class="carousel-section">
  @if (title) {
    <div class="carousel-header">
      <h2>{{ title }}</h2>
      @if (parsedSeeAll; as link) {
        <a
          [routerLink]="link.path"
          [queryParams]="link.queryParams"
          class="see-all"
        >See all</a>
      }
    </div>
  }

  <div class="carousel-container">
    <button (click)="scroll(-1)" class="btn-nav prev" aria-label="Previous">
      <span class="arrow">&#10094;</span>
    </button>

    <div class="carousel-viewport" #viewport>
      @if (loading) {
        @for (s of skeletons; track $index) {
          <div class="skeleton-card" [style.--sk-h.px]="skeletonHeight" [style.--sk-ratio]="skeletonAspectRatio"></div>
        }
      }
      <ng-content></ng-content>
    </div>

    <button (click)="scroll(1)" class="btn-nav next" aria-label="Next">
      <span class="arrow">&#10095;</span>
    </button>
  </div>
</section>

<nav>
  <a routerLink="/" class="nav-logo" aria-label="Wrapity">
    <app-logo variant="icon"></app-logo>
    <span class="nav-logo-text">wrapity</span>
  </a>

  <div class="nav-links">
    <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/search" routerLinkActive="active">Search</a>
    <a routerLink="/activity" routerLinkActive="active">Activity</a>
  </div>

  <div class="nav-actions">
    <div class="nav-profile">
      <button class="nav-avatar-btn" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()">
        @if (user()?.avatar_url) {
          <img class="nav-avatar" [src]="user()!.avatar_url" [alt]="user()!.username" />
        } @else {
          <div class="nav-avatar nav-avatar-initials">{{ getInitials() }}</div>
        }
      </button>

      @if (menuOpen()) {
        <div class="nav-dropdown">
          <span class="dropdown-username">{{ user()?.username }}</span>
          <hr class="dropdown-divider" />
          <a routerLink="/profile" class="dropdown-item" (click)="menuOpen.set(false)">Profile</a>
          <button class="dropdown-item dropdown-item-danger" (click)="logout()">Log out</button>
        </div>
      }
    </div>
  </div>

  <div class="nav-mobile">
    <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <lucide-icon [img]="HouseIcon"></lucide-icon>
    </a>
    <a routerLink="/search" routerLinkActive="active">
      <lucide-icon [img]="SearchIcon"></lucide-icon>
    </a>
    <a routerLink="/create" routerLinkActive="active">
      <lucide-icon [img]="PlusIcon"></lucide-icon>
    </a>
    <a routerLink="/activity" routerLinkActive="active">
      <lucide-icon [img]="ActivityIcon"></lucide-icon>
    </a>
    <a routerLink="/profile" routerLinkActive="active">
      @if (user()?.avatar_url) {
        <img class="nav-avatar" [src]="user()!.avatar_url" [alt]="user()!.username" />
      } @else {
        <div class="nav-avatar nav-avatar-initials">{{ getInitials() }}</div>
      }
    </a>
  </div>
</nav>
